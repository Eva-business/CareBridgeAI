<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1080px; height: 1920px; overflow: hidden; background: #F7FAF6; }
      body { font-family: "Noto Sans JP", sans-serif; }
      #root { position: relative; width: 1080px; height: 1920px; overflow: hidden; background: #F7FAF6; }
      [data-composition-src] { position: absolute; inset: 0; width: 1080px; height: 1920px; overflow: hidden; }
      .app-video {
        position: absolute;
        z-index: 8;
        width: 760px;
        height: 1640px;
        left: 160px;
        top: 150px;
        object-fit: cover;
        object-position: center;
        border: 4px solid #183326;
        border-radius: 64px;
        box-shadow: 0 34px 90px rgba(13, 104, 64, 0.20);
        background: #FFFFFF;
      }
      #video-home { width: 570px; height: 1230px; left: 255px; top: 540px; }
      #video-text { width: 470px; height: 1020px; left: 70px; top: 610px; }
      #video-voice { width: 470px; height: 1020px; left: 540px; top: 610px; }
      #video-browse { width: 590px; height: 1280px; left: 245px; top: 490px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="150" data-width="1080" data-height="1920">
      <div id="el-s1" data-composition-id="s1-hook" data-composition-src="compositions/s1-hook.html" data-start="0" data-duration="12.8" data-track-index="1" data-width="1080" data-height="1920"></div>
      <div id="el-s2" data-composition-id="s2-language" data-composition-src="compositions/s2-language.html" data-start="12" data-duration="14.8" data-track-index="2" data-width="1080" data-height="1920"></div>
      <div id="el-s3" data-composition-id="s3-information" data-composition-src="compositions/s3-information.html" data-start="26" data-duration="14.8" data-track-index="1" data-width="1080" data-height="1920"></div>
      <div id="el-s4" data-composition-id="s4-solution" data-composition-src="compositions/s4-solution.html" data-start="40" data-duration="14.8" data-track-index="2" data-width="1080" data-height="1920"></div>
      <div id="el-s5" data-composition-id="s5-summary" data-composition-src="compositions/s5-summary.html" data-start="54" data-duration="16.8" data-track-index="1" data-width="1080" data-height="1920"></div>
      <div id="el-s6" data-composition-id="s6-recording" data-composition-src="compositions/s6-recording.html" data-start="70" data-duration="18.8" data-track-index="2" data-width="1080" data-height="1920"></div>
      <div id="el-s7" data-composition-id="s7-chat" data-composition-src="compositions/s7-chat.html" data-start="88" data-duration="14.8" data-track-index="1" data-width="1080" data-height="1920"></div>
      <div id="el-s8" data-composition-id="s8-everyday" data-composition-src="compositions/s8-everyday.html" data-start="102" data-duration="16.8" data-track-index="2" data-width="1080" data-height="1920"></div>
      <div id="el-s9" data-composition-id="s9-tech" data-composition-src="compositions/s9-tech.html" data-start="118" data-duration="20.8" data-track-index="1" data-width="1080" data-height="1920"></div>
      <div id="el-s10" data-composition-id="s10-close" data-composition-src="compositions/s10-close.html" data-start="138" data-duration="12" data-track-index="2" data-width="1080" data-height="1920"></div>

      <video id="video-home" class="clip app-video" src="assets/video/home.mp4" data-start="41.5" data-duration="9.3" data-track-index="4" muted playsinline></video>
      <video id="video-text" class="clip app-video" src="assets/video/text-record.mp4" data-start="72" data-duration="10" data-track-index="4" muted playsinline></video>
      <video id="video-voice" class="clip app-video" src="assets/video/voice-record.mov" data-start="78" data-duration="9.8" data-track-index="5" muted playsinline></video>
      <video id="video-browse" class="clip app-video" src="assets/video/quick-browse.mp4" data-start="103" data-duration="15" data-track-index="4" muted playsinline></video>

      <audio id="narration" class="clip" src="assets/voice/narration.wav" data-start="0.5" data-duration="147.816" data-track-index="10" data-volume="1"></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var transitions = [
        ["#el-s1", "#el-s2", 12, "blur"],
        ["#el-s2", "#el-s3", 26, "blur"],
        ["#el-s3", "#el-s4", 40, "push"],
        ["#el-s4", "#el-s5", 54, "blur"],
        ["#el-s5", "#el-s6", 70, "push"],
        ["#el-s6", "#el-s7", 88, "blur"],
        ["#el-s7", "#el-s8", 102, "blur"],
        ["#el-s8", "#el-s9", 118, "push"],
        ["#el-s9", "#el-s10", 138, "focus"]
      ];
      transitions.forEach(function (item) {
        var oldScene = item[0], newScene = item[1], t = item[2], kind = item[3];
        if (kind === "push") {
          tl.to(oldScene, { y: -1920, duration: 0.58, ease: "power3.inOut" }, t);
          tl.fromTo(newScene, { y: 1920, opacity: 1 }, { y: 0, opacity: 1, duration: 0.58, ease: "power3.inOut" }, t);
        } else if (kind === "focus") {
          tl.to(oldScene, { filter: "blur(22px)", opacity: 0, duration: 0.8, ease: "power1.inOut" }, t);
          tl.fromTo(newScene, { filter: "blur(18px)", opacity: 0 }, { filter: "blur(0px)", opacity: 1, duration: 0.8, ease: "power1.inOut" }, t);
        } else {
          tl.to(oldScene, { filter: "blur(16px)", scale: 1.025, opacity: 0, duration: 0.72, ease: "power2.inOut" }, t);
          tl.fromTo(newScene, { filter: "blur(16px)", scale: 0.975, opacity: 0 }, { filter: "blur(0px)", scale: 1, opacity: 1, duration: 0.72, ease: "power2.inOut" }, t + 0.06);
        }
      });

      tl.fromTo("#video-home", { opacity: 0, scale: 0.92, y: 70 }, { opacity: 1, scale: 1, y: 0, duration: 0.9, ease: "expo.out" }, 41.5);
      tl.fromTo("#video-text", { opacity: 0, x: -100, rotation: -4 }, { opacity: 1, x: 0, rotation: -1.5, duration: 0.8, ease: "power3.out" }, 72);
      tl.fromTo("#video-voice", { opacity: 0, x: 100, rotation: 4 }, { opacity: 1, x: 0, rotation: 1.5, duration: 0.9, ease: "back.out(1.3)" }, 78);
      tl.fromTo("#video-browse", { opacity: 0, scale: 1.08, filter: "blur(10px)" }, { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.85, ease: "power3.out" }, 103);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
