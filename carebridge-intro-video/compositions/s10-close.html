<!doctype html><html><body><template>
  <style>
    [data-composition-id="s10-close"]{position:relative;width:1080px;height:1920px;overflow:hidden;background:#E0F5E8;color:#183326}

  </style>
  <div data-composition-id="s10-close" data-width="1080" data-height="1920" data-duration="12">
    <div class="halo" id="s10-halo" data-layout-ignore></div>
    <div class="s10-content">
      <img class="s10-logo" id="s10-logo" src="assets/brand/app-icon.png">

  <script>
    window.__timelines=window.__timelines||{};var tl=gsap.timeline({paused:true});

      .to("[data-composition-id='s10-close']",{opacity:0,duration:.8,ease:"power1.in"},11.1);
    window.__timelines["s10-close"]=tl;
  </script>
</template></body></html>
