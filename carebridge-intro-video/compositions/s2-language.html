<!doctype html><html><body><template>
  <style>
    [data-composition-id="s2-language"]{position:relative;width:1080px;height:1920px;overflow:hidden;background:#F7FAF6;color:#183326}
    .s2-content{width:100%;height:100%;padding:140px 82px;display:flex;flex-direction:column;gap:34px}
    .s2-label{font:700 22px "Space Mono";color:#E64038;letter-spacing:.12em}
    .s2-title{font:700 82px/1.18 "Noto Sans JP";letter-spacing:-.045em;max-width:900px}
    .s2-ghost{position:absolute;top:270px;right:-30px;font:700 190px "Noto Sans JP";color:#E0F5E8;transform:rotate(90deg)}
    .bubble{max-width:790px;padding:34px 40px;border:3px solid #C8DCCE;border-radius:42px;background:#FFFFFF;box-shadow:0 22px 60px rgba(13,104,64,.10)}

    .gap:before,.gap:after{content:"";width:220px;height:4px;background:#E64038}
    .wave{height:90px;display:flex;align-items:center;justify-content:center;gap:10px}
    .wave i{display:block;width:12px;border-radius:12px;background:#1F8F57}.wave i:nth-child(1){height:24px}.wave i:nth-child(2){height:70px}.wave i:nth-child(3){height:42px}.wave i:nth-child(4){height:86px}.wave i:nth-child(5){height:34px}.wave i:nth-child(6){height:62px}
    .s2-note{font:400 31px/1.6 "Noto Sans JP";color:#557064;border-top:3px solid #C8DCCE;padding-top:28px}
    .s2-meta{position:absolute;bottom:74px;left:82px;right:82px;display:flex;justify-content:space-between;font:400 19px "Space Mono";color:#557064}

</template></body></html>
